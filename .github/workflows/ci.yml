name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  create-runner:
    name: Create Runner
    runs-on: [self-hosted, orchestrator]
    outputs:
      label: ${{ steps.create.outputs.label }}
      name: ${{ steps.create.outputs.name }}
      server_id: ${{ steps.create.outputs.server_id }}
    steps:
      - uses: Cyclenerd/hcloud-github-runner@v1
        id: create
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: cax21
          image: "366782359"
          location: nbg1

  check:
    name: Lint, Test & Build
    needs: create-runner
    runs-on: ${{ needs.create-runner.outputs.label }}
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Lint (cargo fmt)
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check

      - name: Lint (cargo clippy — CLI)
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Lint (cargo clippy — Dashboard)
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          mkdir -p apps/web/dist apps/dashboard/src-tauri/binaries
          touch apps/web/dist/start-server.mjs
          cp apps/cli/target/release/band "apps/dashboard/src-tauri/binaries/band-$(rustc -vV | sed -n 's/host: //p')"
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Build web (needed by tests)
        run: pnpm build:web

      - name: Test (web)
        run: pnpm --filter @band/web test

      - name: Install Playwright Chromium
        run: pnpm --filter @band/web exec playwright install --with-deps chromium

      - name: Test e2e (web)
        run: pnpm --filter @band/web test:e2e

      - name: Test (CLI)
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          cargo test --manifest-path apps/cli/Cargo.toml

      - name: Test (Dashboard)
        run: |
          export PATH="/root/.cargo/bin:$PATH"
          cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml

      - name: Build frontend
        run: pnpm --filter @band/dashboard build

  # ── Windows build & test ──────────────────────────────────────────────────
  check-windows:
    name: Windows Build & Test
    runs-on: windows-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store
          key: pnpm-windows-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-windows-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-windows-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Lint (cargo clippy - CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Lint (cargo clippy - Dashboard)
        shell: bash
        run: |
          mkdir -p apps/web/dist apps/dashboard/src-tauri/binaries
          touch apps/web/dist/start-server.mjs
          TARGET=$(rustc -vV | sed -n 's/host: //p')
          cp "apps/cli/target/release/band.exe" "apps/dashboard/src-tauri/binaries/band-${TARGET}.exe"
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Build web
        run: pnpm build:web

      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml

      - name: Test (Dashboard)
        run: cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml

  delete-runner:
    name: Delete Runner
    needs: [create-runner, check]
    runs-on: [self-hosted, orchestrator]
    if: ${{ always() }}
    steps:
      - uses: Cyclenerd/hcloud-github-runner@v1
        continue-on-error: true
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner.outputs.name }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
