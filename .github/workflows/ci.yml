name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: [self-hosted]
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Lint (cargo fmt)
        run: |
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check

      - name: Lint (cargo clippy — CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Lint (cargo clippy — Dashboard)
        run: |
          mkdir -p apps/web/dist apps/dashboard/src-tauri/binaries extensions/vscode/dist
          touch apps/web/dist/start-server.mjs extensions/vscode/dist/extension.js
          cp apps/cli/target/release/band "apps/dashboard/src-tauri/binaries/band-$(rustc -vV | sed -n 's/host: //p')"
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Build web (needed by tests)
        run: pnpm build:web

      - name: Test (web)
        run: pnpm --filter @band-app/server test

      - name: Install Playwright Chromium
        run: pnpm --filter @band-app/server exec playwright install --with-deps chromium

      - name: Test e2e (web)
        run: pnpm --filter @band-app/server test:e2e

      - name: Test (CLI)
        run: cargo test --manifest-path apps/cli/Cargo.toml

      - name: Test (Dashboard)
        run: cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml

      - name: Build frontend
        run: pnpm --filter @band-app/dashboard build
