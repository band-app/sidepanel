name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 1.2.3). Leave empty to use bump or auto-detect."
        required: false
        type: string
      bump:
        description: "Bump type. Leave empty to auto-detect from commits."
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    environment: production
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && '1' || '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' && '1' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache CLI target
        uses: actions/cache@v4
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Cache Dashboard target
        uses: actions/cache@v4
        with:
          path: apps/dashboard/src-tauri/target
          key: cargo-dashboard-${{ runner.os }}-${{ hashFiles('apps/dashboard/src-tauri/Cargo.lock') }}
          restore-keys: cargo-dashboard-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BUMP_ARGS="--version ${{ inputs.version }}"
          elif [ -n "${{ inputs.bump }}" ]; then
            BUMP_ARGS="--bump ${{ inputs.bump }}"
          else
            BUMP_ARGS="--from-commits"
          fi
          NEW_VERSION=$(node scripts/bump-version.mjs $BUMP_ARGS --dry-run 2>&1 | grep "^Version:" | sed 's/Version: .* → //')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_args=$BUMP_ARGS" >> "$GITHUB_OUTPUT"
          echo "Will release version: $NEW_VERSION"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ steps.version.outputs.new_version }} already exists"
            exit 1
          fi

      - name: Bump versions
        run: node scripts/bump-version.mjs ${{ steps.version.outputs.bump_args }}

      - name: Lint
        run: |
          pnpm exec biome check .
          pnpm knip
          pnpm jscpd
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Build CLI
        run: pnpm build:cli

      - name: Download Bun runtime
        run: pnpm download:bun

      - name: Lint (cargo clippy — Dashboard)
        run: |
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          mkdir -p extensions/vscode/dist
          touch extensions/vscode/dist/extension.js
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: |
          pnpm --filter @band-app/server test
          cargo test --manifest-path apps/cli/Cargo.toml
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          mkdir -p extensions/vscode/dist
          touch extensions/vscode/dist/extension.js
          cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml
          rm -rf apps/web/dist

      - name: Build VS Code extension (produces .vsix bundled into Band.app)
        run: pnpm build:extension

      - name: Build frontend
        env:
          BAND_BUILD_SHA: ${{ github.sha }}
          BAND_BUILD_CHANNEL: stable
        run: |
          pnpm build:web
          pnpm --filter @band-app/dashboard build

      - name: Import Apple certificate
        if: ${{ env.HAS_APPLE_CERT == '1' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        if: ${{ env.HAS_APPLE_API_KEY == '1' }}
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP"
          echo -n "$APPLE_API_KEY" | base64 --decode -o "$RUNNER_TEMP/api-key.p8"
          chmod 600 "$RUNNER_TEMP/api-key.p8"

      - name: Build DMG and updater artifacts
        run: pnpm --filter @band-app/dashboard tauri build --ci --config '{"build":{"beforeBuildCommand":""}}' --config src-tauri/tauri.prod.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/api-key.p8

      - name: Cleanup keychain and key
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/api-key.p8"

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Generate latest.json update manifest
        id: manifest
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${VERSION}"
          BUNDLE_DIR="apps/dashboard/src-tauri/target/release/bundle"

          # Find the .app.tar.gz and its signature produced by the updater
          APP_TAR=$(find "$BUNDLE_DIR/macos" -name '*.app.tar.gz' ! -name '*.sig' | head -1)
          SIG_FILE="${APP_TAR}.sig"

          if [ ! -f "$APP_TAR" ] || [ ! -f "$SIG_FILE" ]; then
            echo "Error: updater artifacts not found"
            echo "  APP_TAR=$APP_TAR"
            echo "  SIG_FILE=$SIG_FILE"
            ls -la "$BUNDLE_DIR/macos/" || true
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          APP_TAR_NAME=$(basename "$APP_TAR")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${APP_TAR_NAME}"

          # Use jq to safely encode the multi-line signature into valid JSON
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release notes on GitHub for details." \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64": { signature: $sig, url: $url }
              }
            }' > latest.json

          echo "app_tar=$APP_TAR" >> "$GITHUB_OUTPUT"
          echo "sig_file=$SIG_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated latest.json for $TAG"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            apps/dashboard/src-tauri/target/release/bundle/dmg/*.dmg
            ${{ steps.manifest.outputs.app_tar }}
            ${{ steps.manifest.outputs.sig_file }}
            latest.json

      - name: Publish to npm
        working-directory: apps/web
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
