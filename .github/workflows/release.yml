name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 1.2.3). Leave empty to use bump or auto-detect."
        required: false
        type: string
      bump:
        description: "Bump type. Leave empty to auto-detect from commits."
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache CLI target
        uses: actions/cache@v4
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Cache Dashboard target
        uses: actions/cache@v4
        with:
          path: apps/dashboard/src-tauri/target
          key: cargo-dashboard-${{ runner.os }}-${{ hashFiles('apps/dashboard/src-tauri/Cargo.lock') }}
          restore-keys: cargo-dashboard-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BUMP_ARGS="--version ${{ inputs.version }}"
          elif [ -n "${{ inputs.bump }}" ]; then
            BUMP_ARGS="--bump ${{ inputs.bump }}"
          else
            BUMP_ARGS="--from-commits"
          fi
          NEW_VERSION=$(node scripts/bump-version.mjs $BUMP_ARGS --dry-run 2>&1 | grep "^Version:" | sed 's/Version: .* → //')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_args=$BUMP_ARGS" >> "$GITHUB_OUTPUT"
          echo "Will release version: $NEW_VERSION"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ steps.version.outputs.new_version }} already exists"
            exit 1
          fi

      - name: Bump versions
        run: node scripts/bump-version.mjs ${{ steps.version.outputs.bump_args }}

      - name: Lint
        run: |
          pnpm exec biome check .
          pnpm knip
          pnpm jscpd
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Build CLI
        run: pnpm build:cli

      - name: Lint (cargo clippy — Dashboard)
        run: |
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          mkdir -p extensions/vscode/dist
          touch extensions/vscode/dist/extension.js
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: |
          pnpm --filter @band-app/server test
          cargo test --manifest-path apps/cli/Cargo.toml
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          mkdir -p extensions/vscode/dist
          touch extensions/vscode/dist/extension.js
          cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml
          rm -rf apps/web/dist

      - name: Build frontend
        run: |
          pnpm build:web
          pnpm --filter @band-app/dashboard build

      - name: Build DMG and updater artifacts
        run: pnpm --filter @band-app/dashboard tauri build --ci --config '{"build":{"beforeBuildCommand":""}}' --config src-tauri/tauri.prod.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Generate latest.json update manifest
        id: manifest
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${VERSION}"
          BUNDLE_DIR="apps/dashboard/src-tauri/target/release/bundle"

          # Find the .app.tar.gz and its signature produced by the updater
          APP_TAR=$(find "$BUNDLE_DIR/macos" -name '*.app.tar.gz' ! -name '*.sig' | head -1)
          SIG_FILE="${APP_TAR}.sig"

          if [ ! -f "$APP_TAR" ] || [ ! -f "$SIG_FILE" ]; then
            echo "Error: updater artifacts not found"
            echo "  APP_TAR=$APP_TAR"
            echo "  SIG_FILE=$SIG_FILE"
            ls -la "$BUNDLE_DIR/macos/" || true
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          APP_TAR_NAME=$(basename "$APP_TAR")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${APP_TAR_NAME}"

          # Use jq to safely encode the multi-line signature into valid JSON
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release notes on GitHub for details." \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64": { signature: $sig, url: $url }
              }
            }' > latest.json

          echo "app_tar=$APP_TAR" >> "$GITHUB_OUTPUT"
          echo "sig_file=$SIG_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated latest.json for $TAG"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            apps/dashboard/src-tauri/target/release/bundle/dmg/*.dmg
            ${{ steps.manifest.outputs.app_tar }}
            ${{ steps.manifest.outputs.sig_file }}
            latest.json

      - name: Publish to npm
        working-directory: apps/web
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
