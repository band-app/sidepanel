name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. 1.2.3). Leave empty to use bump or auto-detect."
        required: false
        type: string
      bump:
        description: "Bump type. Leave empty to auto-detect from commits."
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  # ── Determine version ────────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: macos-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      bump_args: ${{ steps.version.outputs.bump_args }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BUMP_ARGS="--version ${{ inputs.version }}"
          elif [ -n "${{ inputs.bump }}" ]; then
            BUMP_ARGS="--bump ${{ inputs.bump }}"
          else
            BUMP_ARGS="--from-commits"
          fi
          NEW_VERSION=$(node scripts/bump-version.mjs $BUMP_ARGS --dry-run 2>&1 | grep "^Version:" | sed 's/Version: .* → //')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_args=$BUMP_ARGS" >> "$GITHUB_OUTPUT"
          echo "Will release version: $NEW_VERSION"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ steps.version.outputs.new_version }} already exists"
            exit 1
          fi

  # ── Build matrix (macOS + Windows) ───────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: version
    strategy:
      matrix:
        include:
          - os: macos-latest
            bundle_target: dmg
            artifact_glob: "apps/dashboard/src-tauri/target/release/bundle/dmg/*.dmg"
          - os: windows-latest
            bundle_target: nsis
            artifact_glob: "apps/dashboard/src-tauri/target/release/bundle/nsis/*.exe"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache CLI target
        uses: actions/cache@v4
        with:
          path: apps/cli/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('apps/cli/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Cache Dashboard target
        uses: actions/cache@v4
        with:
          path: apps/dashboard/src-tauri/target
          key: cargo-dashboard-${{ runner.os }}-${{ hashFiles('apps/dashboard/src-tauri/Cargo.lock') }}
          restore-keys: cargo-dashboard-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        run: node scripts/bump-version.mjs ${{ needs.version.outputs.bump_args }}

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Lint (cargo fmt)
        shell: bash
        run: |
          cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
          cargo fmt --manifest-path apps/dashboard/src-tauri/Cargo.toml -- --check

      - name: Lint (cargo clippy — CLI)
        run: cargo clippy --manifest-path apps/cli/Cargo.toml -- -D warnings

      - name: Build CLI
        run: pnpm build:cli

      - name: Lint (cargo clippy — Dashboard)
        shell: bash
        run: |
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          cargo clippy --manifest-path apps/dashboard/src-tauri/Cargo.toml -- -D warnings

      - name: Test
        shell: bash
        run: |
          pnpm --filter @band/web test
          cargo test --manifest-path apps/cli/Cargo.toml
          mkdir -p apps/web/dist
          touch apps/web/dist/start-server.mjs
          cargo test --manifest-path apps/dashboard/src-tauri/Cargo.toml
          rm -rf apps/web/dist

      - name: Build frontend
        run: |
          pnpm build:web
          pnpm --filter @band/dashboard build

      - name: Build installer
        shell: bash
        run: |
          pnpm --filter @band/dashboard tauri build --ci \
            --bundles ${{ matrix.bundle_target }} \
            --config '{"build":{"beforeBuildCommand":""}}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: ${{ matrix.artifact_glob }}

  # ── Release (runs after all builds succeed) ──────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        run: node scripts/bump-version.mjs ${{ needs.version.outputs.bump_args }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v${{ needs.version.outputs.new_version }}"
          git tag "v${{ needs.version.outputs.new_version }}"
          git push origin main --follow-tags

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..v${{ needs.version.outputs.new_version }}"
          else
            RANGE="v${{ needs.version.outputs.new_version }}"
          fi
          CHANGELOG=$(git log $RANGE --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: release-artifacts/*
